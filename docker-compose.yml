services:
  app:
    build: .
    ports:
      - "8080:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:toolbot@db:3306/toolbot}
      FLASK_DEBUG: "1"
      MAKERSPACE_TIMEZONE: ${MAKERSPACE_TIMEZONE:-America/New_York}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./toolbot:/app/toolbot
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: mariadb:12.2.2
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-toolbot}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-toolbot}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
